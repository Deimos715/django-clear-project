<!DOCTYPE html>
<html lang="ru">
<body style="margin:0;padding:24px;font-family:Arial,sans-serif;background:#f5f7fb;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;">
                    <tr>
                        <td>
                            <h1 style="margin:0 0 16px;font-size:22px;">Подтверждение email</h1>
                            <p style="margin:0 0 12px;">Здравствуйте{% if user.get_full_name %}, {{ user.get_full_name }}{% endif %}.</p>
                            <p style="margin:0 0 16px;">Для завершения регистрации перейдите по ссылке:</p>
                            <p style="margin:0 0 16px;">
                                <a href="{{ activation_url }}" style="color:#1d4ed8;">{{ activation_url }}</a>
                            </p>
                            <p style="margin:0;color:#6b7280;font-size:14px;">Если вы не создавали аккаунт, просто проигнорируйте это письмо.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
